<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>// Zero Bytes — Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <div class="grid-bg" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>

    <header class="frame top">
      <span class="frame-label">SYS.OUT</span>
      <span class="frame-dots">········</span>
      <span class="frame-label">v0.1</span>
    </header>

    <main class="stage">
      <div class="hud">
        <p class="hud-line"><span class="prompt">&gt;</span> SECURE_RELAY</p>
        <p class="hud-sub">[ DIRECT_UPLINK :: MAIL_ENDPOINT ]</p>
      </div>

      <h1 class="title title--compact">
        <span class="title-glitch" data-text="CONTACT">CONTACT</span>
      </h1>

      <div class="contact-panel">
        <p class="contact-label">PRIMARY_ADDRESS</p>
        <a
          class="email-slot"
          href="mailto:your.email@example.com"
          >your.email@example.com</a
        >
      </div>

      <nav class="links links--inline" aria-label="Secondary">
        <a class="link" href="index.html"><span class="link-bracket">[</span> Home <span class="link-bracket">]</span></a>
      </nav>

      <p class="footer-msg">
        <span class="cursor-blink">_</span>
      </p>
    </main>

    <footer class="frame bottom">
      <span class="frame-hex">0x7F2A</span>
      <span class="frame-status">● ONLINE</span>
      <span class="frame-hex">0x7F2B</span>
    </footer>
  </body>
</html>
