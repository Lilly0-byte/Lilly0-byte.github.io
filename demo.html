<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>// Zero Bytes — Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <div class="grid-bg" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>

    <header class="frame top">
      <span class="frame-label">SYS.OUT</span>
      <span class="frame-dots">········</span>
      <span class="frame-label">v0.1</span>
    </header>

    <main class="stage stage--demo">
      <div class="hud">
        <p class="hud-line"><span class="prompt">&gt;</span> PHYSICS_SIM</p>
        <p class="hud-sub">[ VECTOR_FIELD :: ELASTIC_BOUNDARY ]</p>
      </div>

      <h1 class="title title--compact">
        <span class="title-glitch" data-text="BOUNCE">BOUNCE</span>
        <span class="title-static">FIELD</span>
      </h1>

      <div class="game-panel">
        <p class="game-label">SIMULATION_VIEW</p>
        <div class="game-canvas-wrap">
          <canvas
            id="bounce-canvas"
            role="img"
            aria-label="Ball in a box that bounces off walls and off the cursor."
          ></canvas>
        </div>
      </div>

      <nav class="links links--inline" aria-label="Secondary">
        <a class="link" href="index.html"><span class="link-bracket">[</span> Home <span class="link-bracket">]</span></a>
      </nav>

      <p class="footer-msg">
        <span class="cursor-blink">_</span>
      </p>
    </main>

    <footer class="frame bottom">
      <span class="frame-hex">0x7F2A</span>
      <span class="frame-status">● ONLINE</span>
      <span class="frame-hex">0x7F2B</span>
    </footer>

    <script>
      (function () {
        const canvas = document.getElementById("bounce-canvas");
        const ctx = canvas.getContext("2d");
        const ball = { x: 0, y: 0, vx: 140, vy: 90, r: 11 };
        let logicalW = 640;
        let logicalH = 400;
        let last = performance.now();
        /** @type {{ x: number; y: number } | null} */
        let cursor = null;

        const MAX_SPEED = 520;
        /** Logical radius of the cursor as a solid circle the ball bounces off */
        const CURSOR_R = 14;

        function syncCanvasSize() {
          const wrap = canvas.parentElement;
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          logicalW = wrap.clientWidth;
          logicalH = Math.max(220, Math.round((logicalW * 10) / 16));
          canvas.width = Math.floor(logicalW * dpr);
          canvas.height = Math.floor(logicalH * dpr);
          canvas.style.width = logicalW + "px";
          canvas.style.height = logicalH + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          if (ball.x === 0 && ball.y === 0) {
            ball.x = logicalW / 2;
            ball.y = logicalH / 2;
          } else {
            ball.x = Math.min(Math.max(ball.r, ball.x), logicalW - ball.r);
            ball.y = Math.min(Math.max(ball.r, ball.y), logicalH - ball.r);
          }
        }

        function clampSpeed() {
          const s = Math.hypot(ball.vx, ball.vy);
          if (s > MAX_SPEED) {
            ball.vx = (ball.vx / s) * MAX_SPEED;
            ball.vy = (ball.vy / s) * MAX_SPEED;
          }
        }

        function drawGrid() {
          ctx.strokeStyle = "#1c1c1c";
          ctx.lineWidth = 1;
          const step = 32;
          for (let x = 0; x <= logicalW; x += step) {
            ctx.beginPath();
            ctx.moveTo(x + 0.5, 0);
            ctx.lineTo(x + 0.5, logicalH);
            ctx.stroke();
          }
          for (let y = 0; y <= logicalH; y += step) {
            ctx.beginPath();
            ctx.moveTo(0, y + 0.5);
            ctx.lineTo(logicalW, y + 0.5);
            ctx.stroke();
          }
        }

        function pointerToLogical(clientX, clientY) {
          const rect = canvas.getBoundingClientRect();
          const sx = logicalW / rect.width;
          const sy = logicalH / rect.height;
          return {
            x: (clientX - rect.left) * sx,
            y: (clientY - rect.top) * sy,
          };
        }

        function resolveCursorCollision() {
          if (!cursor) return;
          const dx = ball.x - cursor.x;
          const dy = ball.y - cursor.y;
          const dist = Math.hypot(dx, dy);
          const minDist = ball.r + CURSOR_R;
          if (dist >= minDist) return;

          let nx;
          let ny;
          if (dist < 1e-4) {
            nx = 1;
            ny = 0;
          } else {
            nx = dx / dist;
            ny = dy / dist;
          }

          const overlap = minDist - dist;
          ball.x += nx * overlap;
          ball.y += ny * overlap;

          const vn = ball.vx * nx + ball.vy * ny;
          if (vn < 0) {
            ball.vx -= 2 * vn * nx;
            ball.vy -= 2 * vn * ny;
            clampSpeed();
          }
        }

        function frame(now) {
          const dt = Math.min((now - last) / 1000, 0.064);
          last = now;

          ball.x += ball.vx * dt;
          ball.y += ball.vy * dt;

          resolveCursorCollision();

          if (ball.x < ball.r) {
            ball.x = ball.r;
            ball.vx *= -1;
          } else if (ball.x > logicalW - ball.r) {
            ball.x = logicalW - ball.r;
            ball.vx *= -1;
          }
          if (ball.y < ball.r) {
            ball.y = ball.r;
            ball.vy *= -1;
          } else if (ball.y > logicalH - ball.r) {
            ball.y = logicalH - ball.r;
            ball.vy *= -1;
          }

          ctx.fillStyle = "#080808";
          ctx.fillRect(0, 0, logicalW, logicalH);
          drawGrid();

          if (cursor) {
            ctx.strokeStyle = "rgba(245, 245, 245, 0.14)";
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 6]);
            ctx.beginPath();
            ctx.arc(cursor.x, cursor.y, CURSOR_R, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
          }

          const g = ctx.createRadialGradient(
            ball.x - 3,
            ball.y - 3,
            0,
            ball.x,
            ball.y,
            ball.r * 1.8
          );
          g.addColorStop(0, "#ffffff");
          g.addColorStop(0.45, "#e8e8e8");
          g.addColorStop(1, "#9a9a9a");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "#f5f5f5";
          ctx.lineWidth = 1;
          ctx.stroke();

          requestAnimationFrame(frame);
        }

        canvas.addEventListener("pointerenter", (e) => {
          cursor = pointerToLogical(e.clientX, e.clientY);
        });
        canvas.addEventListener("pointermove", (e) => {
          cursor = pointerToLogical(e.clientX, e.clientY);
        });
        canvas.addEventListener("pointerleave", () => {
          cursor = null;
        });

        window.addEventListener("resize", () => {
          syncCanvasSize();
        });

        syncCanvasSize();
        clampSpeed();
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
