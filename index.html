<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>// Zero Bytes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <div class="grid-bg" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>

    <header class="frame top">
      <span class="frame-label">SYS.OUT</span>
      <span class="frame-dots">········</span>
      <span class="frame-label">v0.1</span>
    </header>

    <main class="stage">
      <div class="hud">
        <p class="hud-line"><span class="prompt">&gt;</span> LINK_REGISTRY</p>
        <p class="hud-sub">[ ENCRYPTED_CHANNEL :: PUBLIC_FACING ]</p>
      </div>

      <h1 class="title">
        <span class="title-glitch" data-text="Zero">Zero</span>
        <span class="title-static">Bytes</span>
      </h1>

      <nav class="links" aria-label="Primary">
        <a class="link" href="https://github.com/Lilly0-byte" target="_blank" rel="noopener noreferrer"><span class="link-bracket">[</span> GitHub <span class="link-bracket">]</span></a>
        <a class="link" href="#"><span class="link-bracket">[</span> Docs <span class="link-bracket">]</span></a>
        <a class="link" href="demo.html"><span class="link-bracket">[</span> Demo <span class="link-bracket">]</span></a>
        <a class="link" href="contact.html"><span class="link-bracket">[</span> Contact <span class="link-bracket">]</span></a>
      </nav>

      <p class="footer-msg">
        <span class="cursor-blink">_</span>
      </p>
    </main>

    <footer class="frame bottom">
      <span class="frame-hex">0x7F2A</span>
      <span class="frame-status">● ONLINE</span>
      <span class="frame-hex">0x7F2B</span>
    </footer>
  </body>
</html>
